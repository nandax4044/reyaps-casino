<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Fish PNG Images</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #0a0f1e;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        canvas {
            border: 2px solid #38BDF8;
            margin: 10px;
            background: white;
        }
        .fish-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .fish-item {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        button {
            background: linear-gradient(135deg, #38BDF8, #1D4ED8);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }
        button:hover {
            opacity: 0.9;
        }
        h1 {
            background: linear-gradient(135deg, #38BDF8, #67E8F9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐟 Generate Fish PNG Images</h1>
        <p>Click "Download" button below each fish to save as PNG</p>
        
        <div class="fish-grid" id="fishGrid"></div>
    </div>

    <script>
        const fishTypes = [
            { name: 'common_fish', color: '#60a5fa', label: 'Common Fish' },
            { name: 'rare_fish', color: '#a78bfa', label: 'Rare Fish' },
            { name: 'epic_fish', color: '#f59e0b', label: 'Epic Fish' },
            { name: 'legendary_fish', color: '#ef4444', label: 'Legendary Fish' },
            { name: 'mythic_fish', color: '#ec4899', label: 'Mythic Fish' }
        ];

        function drawFish(canvas, color) {
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw fish body (ellipse)
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, 25, 15, 0, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            
            // Add gradient for depth
            const gradient = ctx.createRadialGradient(centerX - 8, centerY - 5, 5, centerX, centerY, 25);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.2)');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Draw tail
            ctx.beginPath();
            ctx.moveTo(centerX - 25, centerY);
            ctx.lineTo(centerX - 40, centerY - 12);
            ctx.lineTo(centerX - 40, centerY + 12);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
            
            // Draw eye
            ctx.beginPath();
            ctx.arc(centerX + 12, centerY - 5, 3, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX + 13, centerY - 5, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = 'black';
            ctx.fill();
            
            // Draw fins
            ctx.beginPath();
            ctx.moveTo(centerX, centerY + 15);
            ctx.lineTo(centerX - 5, centerY + 25);
            ctx.lineTo(centerX + 5, centerY + 25);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.7;
            ctx.fill();
            ctx.globalAlpha = 1;
            
            // Draw scales (small circles)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 2; j++) {
                    ctx.beginPath();
                    ctx.arc(centerX - 10 + i * 8, centerY - 5 + j * 8, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawLoadingFish(canvas) {
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw animated fish
            ctx.save();
            ctx.translate(centerX, centerY);
            
            // Fish body
            ctx.beginPath();
            ctx.ellipse(0, 0, 40, 25, 0, 0, Math.PI * 2);
            const gradient = ctx.createLinearGradient(-40, -25, 40, 25);
            gradient.addColorStop(0, '#38BDF8');
            gradient.addColorStop(0.5, '#1D4ED8');
            gradient.addColorStop(1, '#67E8F9');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Tail
            ctx.beginPath();
            ctx.moveTo(-40, 0);
            ctx.lineTo(-60, -20);
            ctx.lineTo(-60, 20);
            ctx.closePath();
            ctx.fillStyle = '#38BDF8';
            ctx.fill();
            
            // Eye
            ctx.beginPath();
            ctx.arc(20, -8, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(21, -8, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'black';
            ctx.fill();
            
            // Bubbles
            ctx.fillStyle = 'rgba(103, 232, 249, 0.3)';
            ctx.beginPath();
            ctx.arc(50, -30, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(60, -15, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(70, -25, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function createFishItem(fish) {
            const div = document.createElement('div');
            div.className = 'fish-item';
            
            const canvas = document.createElement('canvas');
            canvas.width = 80;
            canvas.height = 80;
            drawFish(canvas, fish.color);
            
            const label = document.createElement('div');
            label.textContent = fish.label;
            label.style.marginTop = '10px';
            label.style.fontWeight = 'bold';
            
            const button = document.createElement('button');
            button.textContent = 'Download PNG';
            button.onclick = () => {
                const link = document.createElement('a');
                link.download = `${fish.name}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
            
            div.appendChild(canvas);
            div.appendChild(label);
            div.appendChild(button);
            
            return div;
        }

        // Generate all fish
        const grid = document.getElementById('fishGrid');
        fishTypes.forEach(fish => {
            grid.appendChild(createFishItem(fish));
        });

        // Add loading fish
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'fish-item';
        const loadingCanvas = document.createElement('canvas');
        loadingCanvas.width = 150;
        loadingCanvas.height = 150;
        drawLoadingFish(loadingCanvas);
        const loadingLabel = document.createElement('div');
        loadingLabel.textContent = 'Loading Animation';
        loadingLabel.style.marginTop = '10px';
        loadingLabel.style.fontWeight = 'bold';
        const loadingButton = document.createElement('button');
        loadingButton.textContent = 'Download PNG';
        loadingButton.onclick = () => {
            const link = document.createElement('a');
            link.download = 'loading.png';
            link.href = loadingCanvas.toDataURL('image/png');
            link.click();
        };
        loadingDiv.appendChild(loadingCanvas);
        loadingDiv.appendChild(loadingLabel);
        loadingDiv.appendChild(loadingButton);
        grid.appendChild(loadingDiv);

        // Add Lico Rod
        const licoDiv = document.createElement('div');
        licoDiv.className = 'fish-item';
        const licoCanvas = document.createElement('canvas');
        licoCanvas.width = 80;
        licoCanvas.height = 80;
        const licoCtx = licoCanvas.getContext('2d');
        // Draw simple green rod
        licoCtx.strokeStyle = '#22c55e';
        licoCtx.lineWidth = 4;
        licoCtx.beginPath();
        licoCtx.moveTo(20, 70);
        licoCtx.lineTo(60, 10);
        licoCtx.stroke();
        // Add leaf decoration
        licoCtx.fillStyle = '#22c55e';
        licoCtx.beginPath();
        licoCtx.ellipse(50, 20, 8, 12, Math.PI / 4, 0, Math.PI * 2);
        licoCtx.fill();
        const licoLabel = document.createElement('div');
        licoLabel.textContent = 'Lico Rod';
        licoLabel.style.marginTop = '10px';
        licoLabel.style.fontWeight = 'bold';
        const licoButton = document.createElement('button');
        licoButton.textContent = 'Download PNG';
        licoButton.onclick = () => {
            const link = document.createElement('a');
            link.download = 'lico_rod.png';
            link.href = licoCanvas.toDataURL('image/png');
            link.click();
        };
        licoDiv.appendChild(licoCanvas);
        licoDiv.appendChild(licoLabel);
        licoDiv.appendChild(licoButton);
        grid.appendChild(licoDiv);
    </script>
</body>
</html>
